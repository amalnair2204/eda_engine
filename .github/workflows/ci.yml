name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # No secrets are referenced anywhere in this job. The pytest suite mocks the
    # Groq API (see tests/test_phase0.py, test_phase6.py), so it passes without a
    # live GROQ_API_KEY. A dummy value is set only so any os.getenv read is happy.
    env:
      GROQ_API_KEY: dummy-key-for-ci
      GROQ_MODEL: llama-3.3-70b-versatile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff — real errors only, style nits ignored)
        # Lenient: only flag genuine errors (pyflakes F + syntax E9), not style.
        run: ruff check . --select E9,F63,F7,F82 --output-format=github

      - name: Run tests
        run: python -m pytest -q
